# Publish all skills to ClawHub (WorkBuddy BuiltinMarket)
# Runs on every push to main — auto-updates all 6 skills
name: Publish to ClawHub

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'SHARP.md'
  workflow_dispatch:  # allow manual trigger

jobs:
  publish:
    uses: openclaw/clawhub/.github/workflows/skill-publish.yml@main
    with:
      owner: zhouhuijia
      dry_run: false
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}
